<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha - Apresenta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/recover.css') }}">
</head>
<body>
    <div class="container">
        <h1>🔑 Recuperar Senha</h1>
        <p class="subtitle">Digite seu email para receber o link de recuperação</p>
        <div id="message"></div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="seu@email.com">
        </div>
        <button class="btn" onclick="recover()">Enviar Link</button>
        <div class="links">
            <a href="/login">Voltar para o login</a>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/recover.js') }}"></script>
</body>
</html>

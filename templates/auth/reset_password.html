<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Apresenta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/reset_password.css') }}">
</head>
<body>
    <div class="container">
        <h1>🔐 Nova Senha</h1>
        <div id="message"></div>
        <div class="form-group">
            <label>Nova Senha</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <div class="form-group">
            <label>Confirmar Senha</label>
            <input type="password" id="confirm_password" placeholder="••••••••">
        </div>
        <button class="btn" onclick="resetPassword()">Redefinir Senha</button>
    </div>
    <script src="{{ url_for('static', filename='js/reset_password.js') }}"></script>
</body>
</html>

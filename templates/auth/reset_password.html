<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Redefinir Senha - Apresenta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: white;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 400px;
            width: 90%;
            text-align: center;
        }
        .icon { font-size: 60px; margin-bottom: 20px; }
        h1 { 
            color: #333; 
            margin-bottom: 10px;
            font-size: 24px;
        }
        .subtitle {
            color: #666;
            font-size: 14px;
            margin-bottom: 25px;
        }
        .form-group { margin-bottom: 20px; text-align: left; }
        label { 
            display: block; 
            margin-bottom: 5px; 
            color: #555; 
            font-weight: 500;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #ddd;
            border-radius: 10px;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-color: #667eea; outline: none; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .message { 
            margin-top: 15px; 
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        .message.success {
            background: #d4edda;
            color: #155724;
            display: block;
        }
        .message.error {
            background: #f8d7da;
            color: #721c24;
            display: block;
        }
        .links {
            margin-top: 20px;
            font-size: 14px;
        }
        .links a {
            color: #667eea;
            text-decoration: none;
        }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">🔑</div>
        <h1>Redefinir Senha</h1>
        <p class="subtitle">Digite sua nova senha abaixo</p>

        <div id="message" class="message"></div>

        <div class="form-group">
            <label>Nova Senha</label>
            <input type="password" id="new_password" placeholder="Digite sua nova senha">
        </div>
        <div class="form-group">
            <label>Confirmar Senha</label>
            <input type="password" id="confirm_password" placeholder="Confirme sua nova senha">
        </div>

        <button class="btn" id="resetBtn" onclick="resetPassword()">
            🔒 Redefinir Senha
        </button>

        <div class="links">
            <a href="/login">← Voltar para o login</a>
        </div>
    </div>

    <script>
        // Pega o token da URL
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        function showMessage(msg, type = 'success') {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = 'message ' + type;
        }

        async function resetPassword() {
            const password = document.getElementById('new_password').value;
            const confirm = document.getElementById('confirm_password').value;
            const btn = document.getElementById('resetBtn');

            if (!password || !confirm) {
                showMessage('❌ Preencha todos os campos', 'error');
                return;
            }

            if (password !== confirm) {
                showMessage('❌ As senhas não coincidem', 'error');
                return;
            }

            if (password.length < 6) {
                showMessage('❌ A senha deve ter pelo menos 6 caracteres', 'error');
                return;
            }

            btn.disabled = true;
            btn.textContent = '⏳ Processando...';

            try {
                const response = await fetch('/api/reset_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, new_password: password })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showMessage('✅ ' + data.message + '! Redirecionando...', 'success');
                    btn.textContent = '✅ Concluído!';
                    setTimeout(() => {
                        window.location.href = '/login';
                    }, 2000);
                } else {
                    showMessage('❌ ' + data.error, 'error');
                    btn.disabled = false;
                    btn.textContent = '🔒 Redefinir Senha';
                }
            } catch (error) {
                showMessage('❌ Erro de conexão. Tente novamente.', 'error');
                btn.disabled = false;
                btn.textContent = '🔒 Redefinir Senha';
            }
        }

        // Verifica se o token existe
        if (!token) {
            showMessage('❌ Token inválido ou expirado', 'error');
            document.getElementById('resetBtn').disabled = true;
        }

        // Enter para enviar
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') resetPassword();
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Controle - Apresenta</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/controle.css') }}">
</head>
<body>
    <!-- ===== HEADER COM CONFIGURAÇÕES ===== -->
    <div class="header">
        <h1>📽️ Apresenta</h1>
        <div class="header-actions">
            <a href="/settings" class="settings-link" title="Configurações">⚙️</a>
            <button onclick="logout()" class="logout-btn">Sair</button>
        </div>
    </div>

    <div class="container">
        <!-- Tela de Token -->
        <div id="tokenScreen">
            <h2>🔑 Conectar ao PC</h2>
            <p class="subtitle">Digite o token gerado no PC</p>
            <div class="token-input">
                <input type="text" id="tokenInput" placeholder="ex: user_ABC123" maxlength="20" autofocus>
            </div>
            <button class="btn" id="connectBtn" onclick="validateToken()">Conectar</button>
            <div id="tokenMessage"></div>
        </div>

        <!-- Controles -->
        <div id="controlsScreen" style="display: none;">
            <div class="connected-user" id="connectedUser">Conectado como: {{ user_email }}</div>

            <div class="info">
                <div class="slide-number" id="slideNumber">0</div>
                <div class="slide-total">de <span id="totalSlides">0</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>

            <div class="controls">
                <button class="btn-control btn-prev" id="btnPrev" onclick="prevSlide()">⬅️</button>
                <button class="btn-control btn-next" id="btnNext" onclick="nextSlide()">➡️</button>
            </div>

            <div class="status" id="status">Conectado</div>
        </div>
    </div>

    <div class="toast" id="toast"></div>
    <script src="{{ url_for('static', filename='js/controle.js') }}"></script>
    <script>
        async function logout() {
            await fetch('/api/logout', { method: 'POST' });
            window.location.href = '/login';
        }
    </script>
</body>
</html>

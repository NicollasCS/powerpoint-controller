<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎮 Controle - Apresenta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            user-select: none;
            -webkit-user-select: none;
        }
        .container {
            max-width: 400px;
            width: 90%;
            padding: 30px;
            text-align: center;
        }
        .token-input {
            margin-bottom: 30px;
        }
        .token-input input {
            width: 100%;
            padding: 15px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #1a1a2e;
            color: white;
            font-size: 18px;
            text-align: center;
            letter-spacing: 2px;
        }
        .token-input input:focus { border-color: #667eea; outline: none; }
        .btn {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn:hover { transform: scale(1.02); }
        .error { color: #e74c3c; margin-top: 10px; font-size: 14px; }
        .success { color: #2ecc71; margin-top: 10px; font-size: 14px; }
        
        .info { display: none; }
        .info .slide-number {
            font-size: 72px;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .info .slide-total { font-size: 18px; color: #666; }
        .info .progress-bar {
            width: 100%;
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        .info .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            transition: width 0.3s ease;
        }
        .controls {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin: 30px 0;
        }
        .btn-control {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            font-size: 32px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .btn-control:active { transform: scale(0.92); }
        .btn-prev { background: #e74c3c; color: white; }
        .btn-next { background: #2ecc71; color: white; }
        .status { color: #666; font-size: 12px; margin-top: 20px; }
        .swipe-area {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            z-index: 0;
            pointer-events: none;
        }
        .swipe-half {
            flex: 1;
            height: 100%;
            pointer-events: auto;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
            backdrop-filter: blur(10px);
            z-index: 999;
            color: white;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .connected-user {
            color: #888;
            font-size: 12px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Tela de Token -->
        <div id="tokenScreen">
            <h2 style="margin-bottom: 20px;">🔑 Conectar ao PC</h2>
            <p style="color: #888; margin-bottom: 20px;">Digite o token gerado no PC</p>
            <div class="token-input">
                <input type="text" id="tokenInput" placeholder="ex: user_ABC123" maxlength="20">
            </div>
            <button class="btn" onclick="validateToken()">Conectar</button>
            <div id="tokenMessage"></div>
        </div>

        <!-- Controles (aparece após token válido) -->
        <div id="controlsScreen" style="display: none;">
            <div class="connected-user" id="connectedUser">Conectado como: user@email.com</div>
            
            <div class="info">
                <div class="slide-number" id="slideNumber">0</div>
                <div class="slide-total">de <span id="totalSlides">0</span></div>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>
            </div>
            
            <div class="controls">
                <button class="btn-control btn-prev" onclick="prevSlide()">⬅️</button>
                <button class="btn-control btn-next" onclick="nextSlide()">➡️</button>
            </div>
            
            <div class="status" id="status">Conectado</div>
        </div>
        
        <div class="swipe-area">
            <div class="swipe-half" onclick="prevSlide()"></div>
            <div class="swipe-half" onclick="nextSlide()"></div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        let currentSlide = 0;
        let totalSlides = 0;
        let pptId = null;
        let updateInterval = null;

        function showToast(msg, duration = 1500) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.display = 'block';
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => {
                toast.style.display = 'none';
            }, duration);
        }

        function showTokenMessage(msg, isError = true) {
            const el = document.getElementById('tokenMessage');
            el.textContent = msg;
            el.className = isError ? 'error' : 'success';
        }

        async function validateToken() {
            const token = document.getElementById('tokenInput').value.trim();
            if (!token) {
                showTokenMessage('Digite o token');
                return;
            }

            try {
                const response = await fetch('/api/validate_token', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showTokenMessage('✅ Conectado!', false);
                    document.getElementById('connectedUser').textContent = 'Conectado como: ' + data.user_email;
                    document.getElementById('tokenScreen').style.display = 'none';
                    document.getElementById('controlsScreen').style.display = 'block';
                    
                    // Busca o ID da apresentação
                    await loadPresentation(token);
                } else {
                    showTokenMessage('❌ ' + data.error);
                }
            } catch (error) {
                showTokenMessage('❌ Erro de conexão');
            }
        }

        async function loadPresentation(token) {
            try {
                // Busca a apresentação ativa para este token
                const response = await fetch('/api/get_presentation_by_token?token=' + token);
                const data = await response.json();

                if (data.ppt_id) {
                    pptId = data.ppt_id;
                    totalSlides = data.total_slides || 0;
                    updateDisplay();
                    startPolling();
                } else {
                    document.getElementById('status').textContent = '⚠️ Nenhuma apresentação ativa';
                }
            } catch (error) {
                document.getElementById('status').textContent = '⚠️ Erro ao carregar';
            }
        }

        function updateDisplay() {
            document.getElementById('slideNumber').textContent = currentSlide + 1;
            document.getElementById('totalSlides').textContent = totalSlides;
            const progress = totalSlides > 0 ? ((currentSlide + 1) / totalSlides) * 100 : 0;
            document.getElementById('progressFill').style.width = progress + '%';
        }

        function startPolling() {
            if (updateInterval) clearInterval(updateInterval);
            updateInterval = setInterval(updateStatus, 1000);
        }

        async function updateStatus() {
            if (!pptId) return;
            try {
                const response = await fetch(`/api/status/${pptId}`);
                const data = await response.json();
                if (data.error) return;
                
                const newSlide = data.slide_atual || 0;
                if (newSlide !== currentSlide) {
                    currentSlide = newSlide;
                    updateDisplay();
                }
                document.getElementById('status').textContent = '✅ Conectado';
            } catch (error) {
                document.getElementById('status').textContent = '⚠️ Erro de conexão';
            }
        }

        async function nextSlide() {
            if (!pptId) return;
            try {
                await fetch(`/api/next/${pptId}`);
                showToast('⏩ Avançou');
                await updateStatus();
            } catch (error) {
                showToast('❌ Erro', 1000);
            }
        }

        async function prevSlide() {
            if (!pptId) return;
            try {
                await fetch(`/api/prev/${pptId}`);
                showToast('⏪ Voltou');
                await updateStatus();
            } catch (error) {
                showToast('❌ Erro', 1000);
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                nextSlide();
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                prevSlide();
            }
        });

        let touchStartX = 0;
        document.addEventListener('touchstart', (e) => {
            touchStartX = e.changedTouches[0].screenX;
        });
        document.addEventListener('touchend', (e) => {
            const diff = touchStartX - e.changedTouches[0].screenX;
            if (Math.abs(diff) > 50) {
                if (diff > 0) nextSlide();
                else prevSlide();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações - Apresenta</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #0a0a0a;
            min-height: 100vh;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            background: #1a1a2e;
            padding: 40px;
            border-radius: 20px;
            max-width: 450px;
            width: 90%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        h1 { text-align: center; margin-bottom: 30px; color: #fff; font-size: 28px; }
        .user-email {
            text-align: center;
            color: #888;
            margin-bottom: 25px;
            font-size: 14px;
            background: #2d2d44;
            padding: 10px;
            border-radius: 10px;
        }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 5px; color: #aaa; font-size: 14px; }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #333;
            border-radius: 10px;
            background: #2d2d44;
            color: white;
            font-size: 16px;
            transition: 0.3s;
        }
        input:focus { border-color: #667eea; outline: none; }
        input:disabled { opacity: 0.5; cursor: not-allowed; }
        input::placeholder { color: #666; }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 5px;
        }
        .btn:hover { transform: scale(1.02); }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-primary { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .btn-success { background: #2ecc71; color: white; }
        .btn-danger { background: #e74c3c; color: white; }
        .btn-secondary { background: #2d2d44; color: #aaa; }
        .btn-secondary:hover { background: #3d3d5c; }
        .btn-sm {
            padding: 8px 16px;
            font-size: 13px;
            width: auto;
            display: inline-block;
        }
        .message {
            text-align: center;
            margin-top: 10px;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            display: none;
        }
        .message.success { color: #2ecc71; background: rgba(46, 204, 113, 0.1); display: block; }
        .message.error { color: #e74c3c; background: rgba(231, 76, 60, 0.1); display: block; }
        .back-link { text-align: center; margin-top: 25px; }
        .back-link a { color: #667eea; text-decoration: none; font-size: 14px; }
        .back-link a:hover { text-decoration: underline; }
        .divider { border: 1px solid #333; margin: 25px 0; }
        .section-title { color: #888; font-size: 13px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .danger-zone { border: 1px solid #e74c3c; border-radius: 10px; padding: 15px; background: rgba(231, 76, 60, 0.05); }
        .danger-zone .section-title { color: #e74c3c; }
        .step-indicator {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-bottom: 20px;
        }
        .step {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 13px;
        }
        .step .circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #2d2d44;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            font-weight: bold;
            color: #666;
        }
        .step.active .circle { background: #667eea; color: white; }
        .step.done .circle { background: #2ecc71; color: white; }
        .step.active { color: white; }
        .step.done { color: #2ecc71; }
        .hidden { display: none; }
        .code-input {
            text-align: center;
            font-size: 24px;
            letter-spacing: 12px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚙️ Configurações</h1>
        
        <div class="user-email">
            📧 {{ user_email }}
        </div>

        <div id="message" class="message"></div>

        <!-- Trocar Email -->
        <div class="section-title">🔐 Segurança</div>
        
        <!-- PASSO 1: Verificar email atual -->
        <div id="step1">
            <p style="color: #888; font-size: 14px; margin-bottom: 15px;">
                Para alterar seu email, primeiro verifique o email atual.
            </p>
            <button class="btn btn-primary" id="btnSendOldCode" onclick="sendOldEmailCode()">
                📧 Enviar código para o email atual
            </button>
            <div id="oldCodeArea" class="hidden" style="margin-top: 15px;">
                <div class="form-group">
                    <label>Digite o código recebido</label>
                    <input type="text" id="oldCodeInput" class="code-input" placeholder="_ _ _ _ _ _" maxlength="6">
                </div>
                <button class="btn btn-success" onclick="verifyOldEmailCode()">
                    ✅ Verificar código
                </button>
            </div>
        </div>

        <!-- PASSO 2: Digitar novo email (aparece após verificar o código) -->
        <div id="step2" class="hidden">
            <div class="divider"></div>
            <p style="color: #888; font-size: 14px; margin-bottom: 15px;">
                ✅ Email atual verificado! Agora digite o novo email.
            </p>
            <div class="form-group">
                <label>Novo Email</label>
                <input type="email" id="newEmailInput" placeholder="novo@email.com">
            </div>
            <button class="btn btn-primary" onclick="sendNewEmailCode()">
                📧 Enviar código para o novo email
            </button>
            <div id="newCodeArea" class="hidden" style="margin-top: 15px;">
                <div class="form-group">
                    <label>Digite o código recebido no novo email</label>
                    <input type="text" id="newCodeInput" class="code-input" placeholder="_ _ _ _ _ _" maxlength="6">
                </div>
                <button class="btn btn-success" onclick="verifyNewEmailCode()">
                    ✅ Confirmar novo email
                </button>
            </div>
        </div>

        <div class="divider"></div>

        <!-- Trocar Senha -->
        <div class="form-group">
            <label>Senha Atual</label>
            <input type="password" id="current_password" placeholder="••••••••">
        </div>
        <div class="form-group">
            <label>Nova Senha</label>
            <input type="password" id="new_password" placeholder="••••••••">
        </div>
        <button class="btn btn-primary" onclick="changePassword()">Trocar Senha</button>

        <div class="divider"></div>

        <!-- Excluir Conta -->
        <div class="danger-zone">
            <div class="section-title">⚠️ Zona de Perigo</div>
            <button class="btn btn-danger" onclick="deleteAccount()">🗑️ Excluir Conta</button>
            <p style="color: #666; font-size: 12px; margin-top: 10px; text-align: center;">
                Esta ação é irreversível. Todos os dados serão perdidos.
            </p>
        </div>

        <div class="back-link">
            <a href="/">← Voltar para o início</a>
        </div>
    </div>

    <script>
        let step = 1; // 1 = verificar email atual, 2 = digitar novo email

        function showMessage(msg, type = 'success') {
            const el = document.getElementById('message');
            el.textContent = msg;
            el.className = 'message ' + type;
        }

        function hideMessage() {
            document.getElementById('message').className = 'message';
            document.getElementById('message').textContent = '';
        }

        // ========== PASSO 1: Verificar email atual ==========
        async function sendOldEmailCode() {
            const btn = document.getElementById('btnSendOldCode');
            btn.disabled = true;
            btn.textContent = '⏳ Enviando...';
            hideMessage();

            try {
                const response = await fetch('/api/send_old_email_code', { method: 'POST' });
                const data = await response.json();

                if (data.status === 'success') {
                    showMessage('✅ ' + data.message, 'success');
                    document.getElementById('oldCodeArea').classList.remove('hidden');
                } else {
                    showMessage('❌ ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('❌ Erro de conexão', 'error');
            }

            btn.disabled = false;
            btn.textContent = '📧 Enviar código para o email atual';
        }

        async function verifyOldEmailCode() {
            const code = document.getElementById('oldCodeInput').value.trim();
            if (!code || code.length < 6) {
                showMessage('❌ Digite o código de 6 dígitos', 'error');
                return;
            }

            const newEmail = document.getElementById('newEmailInput').value.trim();
            if (!newEmail) {
                showMessage('❌ Digite o novo email primeiro', 'error');
                return;
            }

            hideMessage();

            try {
                const response = await fetch('/api/verify_old_email_code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code, new_email: newEmail })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showMessage('✅ ' + data.message, 'success');
                    document.getElementById('step1').classList.add('hidden');
                    document.getElementById('step2').classList.remove('hidden');
                } else {
                    showMessage('❌ ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('❌ Erro de conexão', 'error');
            }
        }

        // ========== PASSO 2: Verificar novo email ==========
        async function sendNewEmailCode() {
            const btn = document.querySelector('#step2 .btn-primary');
            btn.disabled = true;
            btn.textContent = '⏳ Enviando...';
            hideMessage();

            try {
                const response = await fetch('/api/send_new_email_code', { method: 'POST' });
                const data = await response.json();

                if (data.status === 'success') {
                    showMessage('✅ ' + data.message, 'success');
                    document.getElementById('newCodeArea').classList.remove('hidden');
                } else {
                    showMessage('❌ ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('❌ Erro de conexão', 'error');
            }

            btn.disabled = false;
            btn.textContent = '📧 Enviar código para o novo email';
        }

        async function verifyNewEmailCode() {
            const code = document.getElementById('newCodeInput').value.trim();
            if (!code || code.length < 6) {
                showMessage('❌ Digite o código de 6 dígitos', 'error');
                return;
            }

            hideMessage();

            try {
                const response = await fetch('/api/verify_new_email_code', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ code })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showMessage('✅ ' + data.message + '! Recarregando...', 'success');
                    setTimeout(() => location.reload(), 2000);
                } else {
                    showMessage('❌ ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('❌ Erro de conexão', 'error');
            }
        }

        // ========== Trocar Senha ==========
        async function changePassword() {
            const current = document.getElementById('current_password').value;
            const new_pass = document.getElementById('new_password').value;

            if (!current || !new_pass) {
                showMessage('❌ Preencha todos os campos', 'error');
                return;
            }

            if (new_pass.length < 6) {
                showMessage('❌ A nova senha deve ter pelo menos 6 caracteres', 'error');
                return;
            }

            hideMessage();

            try {
                const response = await fetch('/api/change_password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ current_password: current, new_password: new_pass })
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showMessage('✅ ' + data.message, 'success');
                    document.getElementById('current_password').value = '';
                    document.getElementById('new_password').value = '';
                } else {
                    showMessage('❌ ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('❌ Erro de conexão', 'error');
            }
        }

        // ========== Excluir Conta ==========
        async function deleteAccount() {
            if (!confirm('⚠️ Tem certeza que deseja excluir sua conta? Esta ação é irreversível!')) return;

            try {
                const response = await fetch('/api/delete_account', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });

                const data = await response.json();

                if (data.status === 'success') {
                    showMessage('✅ ' + data.message, 'success');
                    setTimeout(() => window.location.href = '/login', 1500);
                } else {
                    showMessage('❌ ' + data.error, 'error');
                }
            } catch (error) {
                showMessage('❌ Erro de conexão', 'error');
            }
        }

        // Enter para enviar códigos
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('oldCodeInput').value) {
                    verifyOldEmailCode();
                } else if (document.getElementById('newCodeInput').value) {
                    verifyNewEmailCode();
                }
            }
        });
    </script>
</body>
</html>
